      const recognitionRef = useRef(null);

        const initialMessages = {};
        CHARACTERS.forEach(char => { initialMessages[char.id] = [{ sender: 'bot', text: char.greeting }]; });

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = false;
          recognitionRef.current.interimResults = false;
          recognitionRef.current.lang = 'zh-TW';
          recognitionRef.current.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            setInputText(transcript);
            setIsListening(false);
          };
          recognitionRef.current.onend = () => setIsListening(false);
          recognitionRef.current.onerror = () => setIsListening(false);
        }
      }, []);

      const activeChar = CHARACTERS[selectedIndex];

      const toggleListening = () => {
        if (!recognitionRef.current) { alert("您的瀏覽器不支援語音輸入功能！"); return; }
        if (isListening) recognitionRef.current.stop();
        else { setIsListening(true); recognitionRef.current.start(); }
      };

      // 原生穩定語音模組

        if (!useAudioResponse) return;
        try {
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'zh-TW';
          utterance.rate = 1.05;
          utterance.pitch = 1.1;
          window.speechSynthesis.speak(utterance);
        } catch (error) { console.error("TTS Error:", error); }
      };

      const handlePrev = () => setSelectedIndex((prev) => (prev === 0 ? CHARACTERS.length - 1 : prev - 1));
      const handleNext = () => setSelectedIndex((prev) => (prev === CHARACTERS.length - 1 ? 0 : prev + 1));

      const handleSend = async (e) => {
        if (e) e.preventDefault();
        if (!inputText.trim() || isTyping) return;
        
        if (!apiKey) {
            alert("請確認已填入 API 金鑰！");
            return;
        }

        const userText = inputText.trim();
        const currentActiveId = activeChar.id;
        const newMsgs = { ...messages };

        setInputText('');
        setIsTyping(true);

        const rawHistory = newMsgs[currentActiveId].filter(msg => msg.text !== activeChar.greeting && !msg.text.includes("連線異常"));
        const historyContents = [];
        for (const msg of rawHistory) {
          const role = msg.sender === 'user' ? 'user' : 'model';
          if (historyContents.length > 0 && historyContents[historyContents.length - 1].role === role) {
            historyContents[historyContents.length - 1].parts[0].text += "\n" + msg.text;
          } else {
            historyContents.push({ role, parts: [{ text: msg.text }] });
          }
        }

          請使用繁體中文，且回答請精簡（100字以內）。
        `;

          // ✅ 正確且穩定的模型端點：gemini-1.5-flash
          const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {

            body: JSON.stringify({ contents: historyContents, systemInstruction: { parts: [{ text: systemPrompt }] } })

          <header className="bg-white shadow-sm py-3 px-4 sm:px-6 z-20 relative flex items-center justify-between gap-2">
            <div className="flex items-center gap-3 shrink-0">
              <a href="https://farmcmd.github.io/ESGT/" className="flex items-center gap-1.5 px-3 py-1.5 rounded-full transition-all text-xs font-bold bg-emerald-50 text-emerald-700 hover:bg-emerald-100 hover:scale-105 border border-emerald-200 shadow-sm">
                <Home size={16} />
                <span className="hidden md:inline">返回探探里山首頁</span>
              </a>
              <h1 className="text-lg sm:text-xl font-bold text-slate-800 tracking-wide hidden sm:flex items-center gap-2">
                <Sparkles className="text-amber-500" size={20} /> 探探里山 3D 公仔輔助語音室
              </h1>
            </div>
            <button onClick={() => setUseAudioResponse(!useAudioResponse)} className={`flex items-center gap-2 px-3 py-1.5 rounded-full transition-all text-xs font-bold shrink-0 ${useAudioResponse ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-200 text-slate-500'}`}>
              {useAudioResponse ? <Volume2 size={16} /> : <VolumeX size={16} />}
              <span className="hidden sm:inline">{useAudioResponse ? '語音開啟' : '語音關閉'}</span>
            </button>
          </header>

          <div className="bg-white border-y border-slate-100 shadow-sm z-10 px-4 py-3 flex flex-col gap-3">
            <div className="flex items-center gap-3 overflow-x-auto no-scrollbar">
              <div className="flex items-center gap-1.5 text-xs font-bold text-slate-400 uppercase tracking-tighter shrink-0 border-r pr-3"><Cpu size={14} /> AI 核心</div>
              <div className="flex gap-2">
                {['gemini', 'chatgpt', 'grok'].map(ai => (
                  <button key={ai} onClick={() => setSelectedAi(ai)} className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all border ${selectedAi === ai ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-400 border-slate-100'}`}>{ai.toUpperCase()}</button>
                ))}
              </div>
            </div>
            <div className="flex items-center gap-3 overflow-x-auto no-scrollbar">
              <div className="flex items-center gap-1.5 text-xs font-bold text-slate-400 uppercase tracking-tighter shrink-0 border-r pr-3"><Heart size={14} /> 個性</div>
              <div className="flex gap-2">
                {PERSONALITIES.map(p => (
                  <button key={p.id} onClick={() => setSelectedPersonality(p.id)} className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all border flex items-center gap-1.5 whitespace-nowrap ${selectedPersonality === p.id ? 'bg-indigo-500 text-white border-indigo-500 shadow-sm' : 'bg-white text-slate-500 border-slate-100 hover:border-indigo-200'}`}>
                    <span>{p.emoji}</span><span>{p.label}</span>
                  </button>
                ))}
              </div>
            </div>
            <div className="flex items-center gap-3 overflow-x-auto no-scrollbar">
              <div className="flex items-center gap-1.5 text-xs font-bold text-slate-400 uppercase tracking-tighter shrink-0 border-r pr-3"><Smile size={14} /> 心情</div>
              <div className="flex gap-2">
                {MOODS.map(m => (
                  <button key={m.id} onClick={() => setSelectedMood(m.id)} className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all border flex items-center gap-1.5 whitespace-nowrap ${selectedMood === m.id ? 'bg-rose-500 text-white border-rose-500 shadow-sm' : 'bg-white text-slate-500 border-slate-100 hover:border-rose-200'}`}>
                    <span>{m.emoji}</span><span>{m.label}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>

          <main className="flex-1 flex flex-col md:flex-row max-w-6xl w-full mx-auto p-4 gap-4 overflow-hidden">
            <section className="w-full md:w-5/12 flex flex-col items-center justify-center bg-white rounded-3xl shadow-xl border border-slate-100 relative min-h-[380px]">
              <div className="absolute inset-0 opacity-5 pointer-events-none" style={{backgroundImage: 'radial-gradient(#000 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
              <div className="relative w-full h-80 flex items-center justify-center z-10" style={{ perspective: '1400px' }}>
                <div className="relative w-64 h-80 transition-transform duration-1000 ease-[cubic-bezier(0.23,1,0.32,1)]" style={{ transformStyle: 'preserve-3d', transform: `rotateY(${-selectedIndex * 72}deg)` }}>
                  {CHARACTERS.map((char, index) => {
                    const isActive = index === selectedIndex;
                    return (
                      <div key={char.id} className="absolute inset-0 flex flex-col items-center justify-end p-4 cursor-pointer group" style={{ transform: `rotateY(${index * 72}deg) translateZ(240px)`, backfaceVisibility: 'hidden' }} onClick={() => setSelectedIndex(index)}>
                        <div className="relative flex flex-col items-center justify-end w-full mb-8">
                          <FullBodyDoll char={char} isActive={isActive} />
                          <div className={`absolute -bottom-4 w-36 h-10 rounded-[50%] ${char.color} shadow-[0_12px_15px_rgba(0,0,0,0.3)] z-0 transition-all duration-700 ${isActive ? 'scale-100 opacity-100' : 'scale-75 opacity-40'}`}>
                            <div className="absolute inset-0 rounded-[50%] bg-white opacity-20 transform -translate-y-1"></div>
                            <div className={`absolute inset-0 rounded-[50%] ${char.baseColor} transform translate-y-2 -z-10`}></div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div className="absolute bottom-6 w-[85%] bg-white/90 backdrop-blur shadow-sm border border-slate-100 p-4 rounded-2xl text-center">
                <h3 className="text-lg font-bold text-slate-800 leading-tight">{activeChar.name}</h3>
                <p className="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">{activeChar.role}</p>
              </div>
              <button onClick={handlePrev} className="absolute left-4 top-1/2 -translate-y-1/2 p-2 bg-white rounded-full shadow-md border border-slate-100 hover:scale-110 transition-transform active:scale-95"><ChevronLeft size={20} className="text-slate-400" /></button>
              <button onClick={handleNext} className="absolute right-4 top-1/2 -translate-y-1/2 p-2 bg-white rounded-full shadow-md border border-slate-100 hover:scale-110 transition-transform active:scale-95"><ChevronRight size={20} className="text-slate-400" /></button>
            </section>

            <section className="w-full md:w-7/12 flex flex-col rounded-3xl shadow-xl border border-slate-100 bg-white overflow-hidden">
              <div className={`p-4 flex items-center gap-3 ${activeChar.color} text-white`}>
                <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl shadow-inner shrink-0">{activeChar.emoji}</div>
                <div className="flex-1 overflow-hidden">
                  <div className="flex items-center gap-2">
                    <span className="font-bold truncate">{activeChar.name}</span><span className="text-[9px] bg-black/20 px-2 py-0.5 rounded-full backdrop-blur-sm uppercase font-black">{selectedAi}</span>
                  </div>
                  <div className="flex gap-2 mt-1">
                    <span className="text-[9px] bg-white/20 px-1.5 py-0.5 rounded flex items-center gap-1 whitespace-nowrap font-bold">{PERSONALITIES.find(p => p.id === selectedPersonality)?.label}</span>
                    <span className="text-[9px] bg-white/20 px-1.5 py-0.5 rounded flex items-center gap-1 whitespace-nowrap font-bold">{MOODS.find(m => m.id === selectedMood)?.label}</span>
                  </div>
                </div>
              </div>
              <div className={`flex-1 p-4 overflow-y-auto flex flex-col gap-4 ${activeChar.lightColor} bg-opacity-20`}>
                {messages[activeChar.id]?.map((msg, idx) => (
                  <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                    {msg.sender === 'bot' && <div className="w-8 h-8 mr-2 self-end mb-1 flex items-center justify-center bg-white rounded-full text-lg shadow-sm shrink-0 border border-slate-100">{activeChar.emoji}</div>}
                    <div className={`max-w-[85%] p-3 rounded-2xl text-sm shadow-sm leading-relaxed ${msg.sender === 'user' ? 'bg-slate-800 text-white rounded-br-sm' : 'bg-white border border-slate-100 text-slate-800 rounded-bl-sm'}`}>{msg.text}</div>
                  </div>
                ))}
                {isTyping && (
                  <div className="flex justify-start items-center gap-2">
                    <div className="w-8 h-8 flex items-center justify-center bg-white rounded-full text-lg shadow-sm border border-slate-100 shrink-0">{activeChar.emoji}</div>
                    <div className="bg-white/80 border border-slate-100 px-4 py-3 rounded-2xl rounded-bl-sm flex gap-1 shadow-sm italic text-xs text-slate-400 animate-pulse">AI 與語音引擎生成中...</div>
                  </div>
                )}
              </div>
              <div className="p-4 bg-white border-t border-slate-100 flex flex-col gap-2">
                <div className="flex gap-2">
                  <button type="button" onClick={toggleListening} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all shadow-md shrink-0 ${isListening ? 'bg-red-500 text-white animate-pulse' : 'bg-slate-50 text-slate-400 hover:bg-slate-100 border border-slate-200'}`}>
                    {isListening ? <Mic size={20} /> : <MicOff size={20} />}
                  </button>
                  <form onSubmit={handleSend} className="flex-1 flex gap-2">
                    <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} disabled={isTyping} placeholder={isListening ? "傾聽中..." : isTyping ? "思考中..." : "輸入訊息..."} className="flex-1 bg-slate-50 border border-slate-200 rounded-full px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300 transition-all" />
                    <button type="submit" disabled={!inputText.trim() || isTyping} className={`w-12 h-12 rounded-full flex items-center justify-center text-white transition-all shadow-md shrink-0 ${inputText.trim() && !isTyping ? activeChar.color : 'bg-slate-200 text-slate-400'}`}><Send size={20} /></button>
                  </form>
                </div>
              </div>
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
