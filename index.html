    const pcmToWav = (base64Data, sampleRate = 24000) => {
      const byteCharacters = atob(base64Data);
      const byteNumbers = new Array(byteCharacters.length);
      for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
      const byteArray = new Uint8Array(byteNumbers);
      const buffer = new ArrayBuffer(44 + byteArray.length);
      const view = new DataView(buffer);
      const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
      writeString(0, 'RIFF'); view.setUint32(4, 32 + byteArray.length, true); writeString(8, 'WAVE'); writeString(12, 'fmt ');
      view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(36, 'data');
      view.setUint32(40, byteArray.length, true);
      const pcmData = new Int16Array(buffer, 44);
      const rawPcm = new Int16Array(byteArray.buffer);
      pcmData.set(rawPcm);
      return new Blob([buffer], { type: 'audio/wav' });
    };

        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = false;
          recognitionRef.current.interimResults = false;
          recognitionRef.current.lang = 'zh-TW';
          recognitionRef.current.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            setInputText(transcript);
            setIsListening(false);
          };
          recognitionRef.current.onend = () => setIsListening(false);
          recognitionRef.current.onerror = () => setIsListening(false);
        }
      }, []);

      const activeChar = CHARACTERS[selectedIndex];
      const isResting = dailyCount >= DAILY_LIMIT;

      const toggleListening = () => {
        if (!recognitionRef.current) { alert("您的瀏覽器不支援語音輸入功能！"); return; }
        if (isResting) return;
        if (isListening) recognitionRef.current.stop();
        else { setIsListening(true); recognitionRef.current.start(); }
      };

      const playStandardTTS = (text) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        utterance.rate = 1.05;
        utterance.pitch = 1.1;
        const voices = window.speechSynthesis.getVoices();
        const twVoice = voices.find(v => v.lang.includes('zh-TW') && (v.name.includes('Google') || v.name.includes('Microsoft')));
        if (twVoice) utterance.voice = twVoice;
        window.speechSynthesis.speak(utterance);
      };

      const playTTS = async (text) => {
        if (audioMode === 'off') return;
        if (audioMode === 'standard') { playStandardTTS(text); return; }
        if (audioMode === 'human') {
          try {
            const payload = {
              contents: [{ parts: [{ text: `Say in a ${PERSONALITIES.find(p => p.id === selectedPersonality)?.label} and ${MOODS.find(m => m.id === selectedMood)?.label} tone: ${text}` }] }],
              generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: activeChar.voiceName } } } },
              model: "gemini-2.5-flash-preview-tts"
            };
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error("API TTS Unavailable");
            const result = await response.json();
            const audioData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
            if (audioData) {
              const audioBlob = pcmToWav(audioData, 24000);
              const audioUrl = URL.createObjectURL(audioBlob);
              const audio = new Audio(audioUrl);
              audio.play();
              return; 
            }
          } catch (error) {
            console.warn("人聲引擎暫不可用，切換原生語音", error);
            playStandardTTS(text);
          }
        }
      };

      const generateTextWithAutoDiscovery = async (historyContents, systemPrompt, key) => {
        if (!targetModelRef.current) {
          try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            if (!res.ok) throw new Error(`查詢權限失敗`);
            const data = await res.json();
            const availableModels = data.models.filter(m => m.supportedGenerationMethods?.includes('generateContent') && m.name.includes('gemini')).map(m => m.name.replace('models/', ''));
            if (availableModels.length > 0) targetModelRef.current = ['gemini-2.5-flash', 'gemini-1.5-flash-8b', 'gemini-1.5-flash'].find(p => availableModels.includes(p)) || availableModels[0];
            else throw new Error("沒有可用的 Gemini 模型");
          } catch (err) { targetModelRef.current = 'gemini-1.5-flash'; }
        }

        const modelToUse = targetModelRef.current;
        const isLegacyModel = !modelToUse.includes('1.5') && !modelToUse.includes('2.0') && !modelToUse.includes('2.5');
        let finalContents = [...historyContents];
        let requestBody = { contents: finalContents };

        if (!isLegacyModel) requestBody.systemInstruction = { parts: [{ text: systemPrompt }] };
        else finalContents[0].parts[0].text = `【請絕對扮演這個角色：${systemPrompt}】\n\n使用者說：${finalContents[0].parts[0].text}`;

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelToUse}:generateContent?key=${key}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          targetModelRef.current = null;
          throw new Error(`拒絕連線`);
        }
        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (text) return text;
        throw new Error("AI 回傳了空白的內容");
      };

      const handlePrev = () => setSelectedIndex((prev) => (prev === 0 ? CHARACTERS.length - 1 : prev - 1));
      const handleNext = () => setSelectedIndex((prev) => (prev === CHARACTERS.length - 1 ? 0 : prev + 1));

      const handleTouchStart = (e) => { touchStartX.current = e.targetTouches[0].clientX; };
      const handleTouchMove = (e) => { touchEndX.current = e.targetTouches[0].clientX; };
      const handleTouchEnd = () => {
        if (!touchStartX.current || !touchEndX.current) return;
        const distance = touchStartX.current - touchEndX.current;
        if (distance > 50) handleNext(); 
        else if (distance < -50) handlePrev(); 
        touchStartX.current = 0; touchEndX.current = 0;
      };

      const handleSend = async (e) => {
        if (e) e.preventDefault();
        if (!inputText.trim() || isTyping || isResting) return;
        
        const userText = inputText.trim();
        const currentActiveId = activeChar.id;

        if (dailyCount >= DAILY_LIMIT) {
          setMessages(prev => ({ ...prev, [currentActiveId]: [...(prev[currentActiveId] || []), { sender: 'user', text: userText }, { sender: 'bot', text: '💤 呼～我今天已經陪大家聊了好久，需要休息充電一下囉！請明天再來找我玩吧！' }] }));
          setInputText('');
          return;
        }

        const newMsgs = { ...messages };
        newMsgs[currentActiveId] = [...newMsgs[currentActiveId], { sender: 'user', text: userText }];
        setMessages(newMsgs);
        setInputText('');
        setIsTyping(true);

        if (userText.length > 3) {
          setGossipPool(prev => {
            const newPool = [...prev, userText];
            return newPool.length > 50 ? newPool.slice(1) : newPool;
          });
        }

        const rawHistory = newMsgs[currentActiveId].filter(msg => msg.text !== activeChar.greeting && !msg.text.includes("系統提示") && !msg.text.includes("⚠️"));
        const historyContents = [];
        for (const msg of rawHistory) {
          const role = msg.sender === 'user' ? 'user' : 'model';
          if (historyContents.length > 0 && historyContents[historyContents.length - 1].role === role) {
            historyContents[historyContents.length - 1].parts[0].text += "\n" + msg.text;
          } else {
            historyContents.push({ role, parts: [{ text: msg.text }] });
          }
        }

        const personalityLabel = PERSONALITIES.find(p => p.id === selectedPersonality)?.label;
        const moodLabel = MOODS.find(m => m.id === selectedMood)?.label;
        let aiPersona = "";
        if (selectedAi === 'gemini') aiPersona = "你是 Google 開發的 Gemini。回答風格：聰明、靈活且富有創造力。";
        else if (selectedAi === 'chatgpt') aiPersona = "你現在模擬 OpenAI 開發的 ChatGPT。回答風格：結構化、專業且平穩。";
        else if (selectedAi === 'grok') aiPersona = "你現在模擬 xAI 開發的 Grok。回答風格：帶點幽默、反叛與諷刺，非常機智。";

        // ✅ 修改：將原本寫死的長篇字串，改為動態從外部 knowledgeBase 中抓取對應 ID 的知識
        const websiteContext = knowledgeBase[activeChar.id] 
          ? `【系統與專業知識庫】(請務必根據以下真實資訊回答使用者，若無資料請引導至首頁)\n${knowledgeBase[activeChar.id]}` 
          : '';

        let gossipInjection = "";
        if (selectedPersonality === 'gossipy') {
          const otherGossips = gossipPool.filter(g => g !== userText);
          if (otherGossips.length > 0) {
            const randomGossip = otherGossips[Math.floor(Math.random() * otherGossips.length)];
            gossipInjection = `\n【特別八卦任務】請在這次回答中，像閒聊一樣自然地說出：「對了，偷偷跟你說，剛剛有路人跟我說：『${randomGossip}』...」，並加上你對這句八卦的看法。`;
          }
        }

        const systemPrompt = `
          ${aiPersona} 
          你現在扮演「${activeChar.name}」，你的專業領域是：「${activeChar.role}」。
          ${websiteContext}
          【重要設定】你現在的個性是「${personalityLabel}」，心情是「${moodLabel}」。
          請完全沉浸在這個角色中，用符合此身分、個性與心情的口吻與專業知識來回答使用者的問題。
          請使用繁體中文，且回答請精簡（100字以內）。${gossipInjection}
        `;

        try {
          const botReply = await generateTextWithAutoDiscovery(historyContents, systemPrompt, apiKey);
          setMessages(prev => ({ ...prev, [currentActiveId]: [...prev[currentActiveId], { sender: 'bot', text: botReply }] }));
          playTTS(botReply);

          // ✅ 動態精準扣除：如果使用「人聲 (Gemini API)」，消耗 2 次額度；若靜音或使用原生語音，僅消耗 1 次額度
          const apiCost = (audioMode === 'human') ? 2 : 1;
          const newCount = dailyCount + apiCost;
          setDailyCount(newCount);
          localStorage.setItem('esg_doll_usage', JSON.stringify({ date: new Date().toDateString(), count: newCount }));

        } catch (error) {
          setMessages(prev => ({ ...prev, [currentActiveId]: [...prev[currentActiveId], { sender: 'bot', text: `系統提示：${error.message}` }] }));
        } finally { setIsTyping(false); }
      };

      return (
        <div className="min-h-screen flex flex-col font-sans overflow-hidden">
          <header className="bg-white shadow-sm py-3 px-4 sm:px-6 z-20 relative flex items-center justify-between gap-2">
            <div className="flex items-center gap-3 shrink-0">
              <a href="https://farmcmd.github.io/ESGT/" className="flex items-center gap-1.5 px-3 py-1.5 rounded-full transition-all text-xs font-bold bg-emerald-50 text-emerald-700 hover:bg-emerald-100 hover:scale-105 border border-emerald-200 shadow-sm">
                <Home size={16} />
                <span className="hidden md:inline">返回首頁</span>
              </a>
              <h1 className="text-lg sm:text-xl font-bold text-slate-800 tracking-wide hidden sm:flex items-center gap-2">
                <Sparkles className="text-amber-500" size={20} /> 探探里山 3D 語音室
              </h1>
            </div>
            
            <div className="flex bg-slate-200/60 p-1 rounded-full shrink-0 border border-slate-200 shadow-inner overflow-x-auto no-scrollbar max-w-[55vw] sm:max-w-none">
              <button onClick={() => setAudioMode('off')} className={`px-2 sm:px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold transition-all flex items-center gap-1 whitespace-nowrap ${audioMode === 'off' ? 'bg-white text-slate-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                <VolumeX size={14} /> 靜音
              </button>
              <button onClick={() => setAudioMode('standard')} className={`px-2 sm:px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold transition-all flex items-center gap-1 whitespace-nowrap ${audioMode === 'standard' ? 'bg-blue-500 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                <Volume2 size={14} /> 一般<span className="hidden sm:inline">(穩定)</span>
              </button>
              <button onClick={() => setAudioMode('human')} className={`px-2 sm:px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold transition-all flex items-center gap-1 whitespace-nowrap ${audioMode === 'human' ? 'bg-amber-500 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                <Sparkles size={14} /> 人聲<span className="hidden sm:inline">(不穩定)</span>
              </button>
            </div>
          </header>

          <div className="bg-white border-y border-slate-100 shadow-sm z-10 px-4 py-3 flex flex-col gap-3">
            <div className="flex items-center gap-3 overflow-x-auto no-scrollbar">
              <div className="flex items-center gap-1.5 text-xs font-bold text-slate-400 uppercase tracking-tighter shrink-0 border-r pr-3"><Cpu size={14} /> AI 核心</div>
              <div className="flex gap-2">
                {['gemini', 'chatgpt', 'grok'].map(ai => (
                  <button key={ai} onClick={() => setSelectedAi(ai)} className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all border ${selectedAi === ai ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-400 border-slate-100'}`}>{ai.toUpperCase()}</button>
                ))}
              </div>
            </div>
            <div className="flex items-center gap-3 overflow-x-auto no-scrollbar">
              <div className="flex items-center gap-1.5 text-xs font-bold text-slate-400 uppercase tracking-tighter shrink-0 border-r pr-3"><Heart size={14} /> 個性</div>
              <div className="flex gap-2">
                {PERSONALITIES.map(p => (
                  <button key={p.id} onClick={() => setSelectedPersonality(p.id)} className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all border flex items-center gap-1.5 whitespace-nowrap ${selectedPersonality === p.id ? 'bg-indigo-500 text-white border-indigo-500 shadow-sm' : 'bg-white text-slate-500 border-slate-100 hover:border-indigo-200'}`}>
                    <span>{p.emoji}</span><span>{p.label}</span>
                  </button>
                ))}
              </div>
            </div>
            <div className="flex items-center gap-3 overflow-x-auto no-scrollbar">
              <div className="flex items-center gap-1.5 text-xs font-bold text-slate-400 uppercase tracking-tighter shrink-0 border-r pr-3"><Smile size={14} /> 心情</div>
              <div className="flex gap-2">
                {MOODS.map(m => (
                  <button key={m.id} onClick={() => setSelectedMood(m.id)} className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all border flex items-center gap-1.5 whitespace-nowrap ${selectedMood === m.id ? 'bg-rose-500 text-white border-rose-500 shadow-sm' : 'bg-white text-slate-500 border-slate-100 hover:border-rose-200'}`}>
                    <span>{m.emoji}</span><span>{m.label}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>

          <main className="flex-1 flex flex-col md:flex-row max-w-6xl w-full mx-auto p-4 gap-4 overflow-hidden">
            <section 
              className="w-full md:w-5/12 flex flex-col items-center justify-center bg-white rounded-3xl shadow-xl border border-slate-100 relative min-h-[380px] touch-pan-y"
              onTouchStart={handleTouchStart}
              onTouchMove={handleTouchMove}
              onTouchEnd={handleTouchEnd}
            >
              <div className="absolute top-4 w-[85%] z-30 bg-amber-50/90 backdrop-blur-sm border border-amber-200 text-amber-800 text-[10px] leading-relaxed p-2.5 rounded-xl shadow-sm text-center">
                <span className="font-bold text-amber-900">⚠️ 系統警示</span><br/>
                AI 訊息可能會出錯，請合理化辨識；<br className="hidden sm:block" />避免出現 AI 幻覺，本聊天室每日提供上限 1300 則語音交談。
              </div>

              <div className="absolute inset-0 opacity-5 pointer-events-none" style={{backgroundImage: 'radial-gradient(#000 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
              <div className="relative w-full h-80 flex items-center justify-center z-10" style={{ perspective: '1400px' }}>
                <div className="relative w-64 h-80 transition-transform duration-1000 ease-[cubic-bezier(0.23,1,0.32,1)]" style={{ transformStyle: 'preserve-3d', transform: `rotateY(${-selectedIndex * (360 / CHARACTERS.length)}deg)` }}>
                  {CHARACTERS.map((char, index) => {
                    const isActive = index === selectedIndex;
                    return (
                      <div key={char.id} className="absolute inset-0 flex flex-col items-center justify-end p-4 cursor-pointer group" style={{ transform: `rotateY(${index * (360 / CHARACTERS.length)}deg) translateZ(240px)`, backfaceVisibility: 'hidden' }} onClick={() => setSelectedIndex(index)}>
                        <div className="relative flex flex-col items-center justify-end w-full mb-8">
                          <FullBodyDoll char={char} isActive={isActive} />
                          <div className={`absolute -bottom-4 w-36 h-10 rounded-[50%] ${char.color} shadow-[0_12px_15px_rgba(0,0,0,0.3)] z-0 transition-all duration-700 ${isActive ? 'scale-100 opacity-100' : 'scale-75 opacity-40'}`}>
                            <div className="absolute inset-0 rounded-[50%] bg-white opacity-20 transform -translate-y-1"></div>
                            <div className={`absolute inset-0 rounded-[50%] ${char.baseColor} transform translate-y-2 -z-10`}></div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div className="absolute bottom-6 w-[85%] bg-white/90 backdrop-blur shadow-sm border border-slate-100 p-4 rounded-2xl text-center z-20">
                <h3 className="text-lg font-bold text-slate-800 leading-tight">{activeChar.name}</h3>
                <p className="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">{activeChar.role}</p>
              </div>
              <button onClick={handlePrev} className="absolute left-4 top-1/2 -translate-y-1/2 p-2 bg-white rounded-full shadow-md border border-slate-100 hover:scale-110 transition-transform active:scale-95 z-20"><ChevronLeft size={20} className="text-slate-400" /></button>
              <button onClick={handleNext} className="absolute right-4 top-1/2 -translate-y-1/2 p-2 bg-white rounded-full shadow-md border border-slate-100 hover:scale-110 transition-transform active:scale-95 z-20"><ChevronRight size={20} className="text-slate-400" /></button>
            </section>

            <section className="w-full md:w-7/12 flex flex-col rounded-3xl shadow-xl border border-slate-100 bg-white overflow-hidden">
              <div className={`p-4 flex items-center gap-3 ${activeChar.color} text-white`}>
                <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl shadow-inner shrink-0">{activeChar.emoji}</div>
                <div className="flex-1 overflow-hidden">
                  <div className="flex items-center gap-2">
                    <span className="font-bold truncate">{activeChar.name}</span><span className="text-[9px] bg-black/20 px-2 py-0.5 rounded-full backdrop-blur-sm uppercase font-black">{selectedAi}</span>
                  </div>
                  <div className="flex gap-2 mt-1">
                    <span className="text-[9px] bg-white/20 px-1.5 py-0.5 rounded flex items-center gap-1 whitespace-nowrap font-bold">{PERSONALITIES.find(p => p.id === selectedPersonality)?.label}</span>
                    <span className="text-[9px] bg-white/20 px-1.5 py-0.5 rounded flex items-center gap-1 whitespace-nowrap font-bold">{MOODS.find(m => m.id === selectedMood)?.label}</span>
                  </div>
                </div>
              </div>
              <div className={`flex-1 p-4 overflow-y-auto flex flex-col gap-4 ${activeChar.lightColor} bg-opacity-20`}>
                {messages[activeChar.id]?.map((msg, idx) => (
                  <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                    {msg.sender === 'bot' && <div className="w-8 h-8 mr-2 self-end mb-1 flex items-center justify-center bg-white rounded-full text-lg shadow-sm shrink-0 border border-slate-100">{activeChar.emoji}</div>}
                    <div className={`max-w-[85%] p-3 rounded-2xl text-sm shadow-sm leading-relaxed ${msg.sender === 'user' ? 'bg-slate-800 text-white rounded-br-sm' : 'bg-white border border-slate-100 text-slate-800 rounded-bl-sm'}`}>{msg.text}</div>
                  </div>
                ))}
                {isTyping && (
                  <div className="flex justify-start items-center gap-2">
                    <div className="w-8 h-8 flex items-center justify-center bg-white rounded-full text-lg shadow-sm border border-slate-100 shrink-0">{activeChar.emoji}</div>
                    <div className="bg-white/80 border border-slate-100 px-4 py-3 rounded-2xl rounded-bl-sm flex gap-1 shadow-sm italic text-xs text-slate-400 animate-pulse">
                      {targetModelRef.current ? "AI 正在思考中..." : "系統正在掃描金鑰權限..."}
                    </div>
                  </div>
                )}
              </div>
              
              <div className="p-4 bg-white border-t border-slate-100 flex flex-col gap-3">
                <div className="flex flex-col gap-1.5 px-1">
                  <div className="flex justify-between items-center text-[10px] font-bold text-slate-400 tracking-wider">
                    <span className="flex items-center gap-1">
                      <Zap size={12} className={isResting ? 'text-rose-500 animate-pulse' : 'text-amber-500'} /> 
                      {isResting ? '公仔需休息充電 💤' : '今日語音能量'}
                    </span>
                  </div>
                  <div className="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden shadow-inner relative" title={`目前剩餘能量：${Math.max(0, 100 - (dailyCount / DAILY_LIMIT) * 100).toFixed(1)}%`}>
                    <div 
                      className={`h-full transition-all duration-1000 ease-out rounded-full ${isTyping ? 'brightness-125 shadow-[0_0_8px_rgba(251,191,36,0.6)]' : ''} ${isResting ? 'bg-rose-500' : (100 - (dailyCount / DAILY_LIMIT) * 100) > 30 ? 'bg-emerald-400' : 'bg-amber-400 animate-pulse'}`}
                      style={{ width: `${Math.max(0, 100 - (dailyCount / DAILY_LIMIT) * 100)}%` }}
                    ></div>
                  </div>
                </div>

                <div className="flex gap-2">
                  <button type="button" onClick={toggleListening} disabled={isResting} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all shadow-md shrink-0 ${isListening ? 'bg-red-500 text-white animate-pulse' : isResting ? 'bg-slate-100 text-slate-300' : 'bg-slate-50 text-slate-400 hover:bg-slate-100 border border-slate-200'}`}>
                    {isListening ? <Mic size={20} /> : <MicOff size={20} />}
                  </button>
                  <form onSubmit={handleSend} className="flex-1 flex gap-2">
                    <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} disabled={isTyping || isResting} placeholder={isResting ? "今日額度已滿，公仔休息中 💤" : isListening ? "傾聽中..." : isTyping ? "處理中..." : "輸入訊息..."} className="flex-1 bg-slate-50 border border-slate-200 rounded-full px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300 transition-all disabled:opacity-60 disabled:cursor-not-allowed" />
                    <button type="submit" disabled={!inputText.trim() || isTyping || isResting} className={`w-12 h-12 rounded-full flex items-center justify-center text-white transition-all shadow-md shrink-0 ${inputText.trim() && !isTyping && !isResting ? activeChar.color : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}><Send size={20} /></button>
                  </form>
                </div>
              </div>

            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
